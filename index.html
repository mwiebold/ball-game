<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Ball Escape Studio</title>
  </head>
  <body>
    <div id="app">
      <div id="stage">
        <canvas id="game" aria-label="Ball escape game canvas" role="img"></canvas>
      </div>
      <button
        id="panel-toggle"
        type="button"
        aria-label="Open settings"
        aria-controls="panel"
        aria-expanded="false"
      >
        ⚙
      </button>
      <div id="panel-backdrop" hidden></div>
      <aside id="panel"></aside>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
