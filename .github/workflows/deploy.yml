name: Deploy to GitHub Pages

# Builds the static site and publishes it to GitHub Pages.
#
# One-time setup: in the repo, Settings → Pages → Build and deployment →
# Source: "GitHub Actions". Then pushes to the default branch deploy
# automatically.
#
# Note: GitHub Pages is not available for PRIVATE repos on the free plan. To go
# live, either make the repo public (Settings → General → Danger Zone → Change
# visibility) or use a plan that includes private Pages (Pro/Team/Enterprise).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; newer runs cancel in-progress ones.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
