name: Deploy to GitHub Pages

# Builds the static site and publishes it to GitHub Pages.
#
# REQUIRED one-time setup (the Actions token cannot create the Pages site
# itself — `enablement: true` fails with "Resource not accessible by
# integration"): in the repo, Settings → Pages → Build and deployment →
# Source: "GitHub Actions". After that, every push to the default branch
# deploys automatically.
#
# Pages also requires the repo be public (or a plan that includes private Pages).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; newer runs cancel in-progress ones.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
